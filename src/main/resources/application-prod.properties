# =============================================
# PERFIL DE PRODUÇÃO - Banco PostgreSQL (Render + Supabase)
# =============================================

# Define a porta do servidor dinamicamente de acordo com o Render
server.port=${PORT:8080}

# Variáveis de conexão com suporte a múltiplos formatos
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:${DB_USER:postgres}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:${DB_PASS:}}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - atualiza as tabelas em produção (sem recriar)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desabilita o console H2 em produção por segurança
spring.h2.console.enabled=false

